# ArgoCD AppProjects
#
# AppProjects define the boundaries of what ArgoCD can deploy and manage.
# They are the foundation of multi-tenant ArgoCD security.
#
# Sync wave: -10 (must exist before any Application/ApplicationSet)
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: model-serving
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  description: "Model serving workloads — vLLM, ONNX Runtime GenAI, AI Gateway"
  sourceRepos:
    - https://github.com/rustnew/custom-ai-ops.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: model-serving-*
    - server: https://kubernetes.default.svc
      namespace: envoy-gateway-system
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: external-secrets.io
      kind: ClusterSecretStore
    - group: cert-manager.io
      kind: ClusterIssuer
  namespaceResourceWhitelist:
    - group: apps
      kind: StatefulSet
    - group: apps
      kind: DaemonSet
    - group: ""
      kind: Service
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Secret
    - group: ""
      kind: ServiceAccount
    - group: networking.k8s.io
      kind: NetworkPolicy
    - group: policy
      kind: PodDisruptionBudget
    - group: monitoring.coreos.com
      kind: ServiceMonitor
    - group: keda.sh
      kind: ScaledObject
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
    - group: gateway.networking.k8s.io
      kind: BackendTrafficPolicy
    - group: gateway.envoyproxy.io
      kind: HTTPRouteFilter
    - group: external-secrets.io
      kind: ExternalSecret
    - group: cert-manager.io
      kind: Certificate
  namespaceResourceBlacklist:
    - group: ""
      kind: ResourceQuota
    - group: ""
      kind: LimitRange
  roles:
    - name: admin
      description: "Full access to model-serving project"
      policies:
        - p, proj:model-serving:admin, applications, *, model-serving/*, allow
      groups:
        - model-serving-admins
    - name: viewer
      description: "Read-only access to model-serving project"
      policies:
        - p, proj:model-serving:viewer, applications, get, model-serving/*, allow
      groups:
        - model-serving-viewers
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: infrastructure
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  description: "Cluster infrastructure — GPU operator, storage, observability stack"
  sourceRepos:
    - https://github.com/rustnew/custom-ai-ops.git
    - https://nvidia.github.io/gpu-operator
    - https://charts.longhorn.io
    - https://prometheus-community.github.io/helm-charts
  destinations:
    - server: https://kubernetes.default.svc
      namespace: gpu-operator
    - server: https://kubernetes.default.svc
      namespace: longhorn-system
    - server: https://kubernetes.default.svc
      namespace: monitoring
    - server: https://kubernetes.default.svc
      namespace: keda-system
    - server: https://kubernetes.default.svc
      namespace: cert-manager
    - server: https://kubernetes.default.svc
      namespace: external-secrets
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: storage.k8s.io
      kind: StorageClass
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: cert-manager.io
      kind: ClusterIssuer
  roles:
    - name: admin
      description: "Full access to infrastructure project"
      policies:
        - p, proj:infrastructure:admin, applications, *, infrastructure/*, allow
      groups:
        - platform-admins