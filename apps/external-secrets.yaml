# ExternalSecrets — SaaS API keys and external credentials
#
# This manifest uses External Secrets Operator (ESO) to pull API keys
# from an external secret store (HashiCorp Vault, AWS Secrets Manager,
# Google Secret Manager, or Azure Key Vault) and create Kubernetes Secrets.
#
# PREREQUISITES:
#   1. External Secrets Operator installed in the cluster
#      kubectl apply -f https://raw.githubusercontent.com/external-secrets/external-secrets/main/deploy/crds/bundle.yaml
#   2. A SecretStore configured with credentials to access your secret backend
#   3. The following secrets must exist in your secret backend:
#      - saas/openai-api-key          → OpenAI API key
#      - saas/anthropic-api-key       → Anthropic Claude API key
#      - saas/google-vertex-ai-key    → Google Vertex AI service account JSON
#      - saas/azure-openai-key        → Azure OpenAI API key
#      - saas/mistral-api-key         → Mistral AI API key
#      - saas/cohere-api-key          → Cohere API key
#      - saas/aws-bedrock-key         → AWS Bedrock access key
#      - alerting/pagerduty-service-key → PagerDuty Events API v2 integration key
#      - alerting/slack-webhook-url      → Slack incoming webhook URL
#      - registry/github-pat            → GitHub PAT for ArgoCD Image Updater
#
# See docs/external-tools.md for complete setup instructions.
---
# SecretStore — points to your external secret backend
# Uncomment the backend you use (Vault, AWS, GCP, or Azure)
---
# === HashiCorp Vault ===
# apiVersion: external-secrets.io/v1beta1
# kind: SecretStore
# metadata:
#   name: vault-backend
#   namespace: model-serving-prod
# spec:
#   provider:
#     vault:
#       server: "https://vault.vault.svc.cluster.local:8200"
#       path: "kv"
#       version: "v2"
#       auth:
#         kubernetes:
#           mountPath: "kubernetes"
#           role: "model-serving"
#           serviceAccountRef:
#             name: model-serving-engine
#             namespace: model-serving-prod
---
# === AWS Secrets Manager ===
# ClusterSecretStore (not SecretStore) so ExternalSecrets in multiple
# namespaces (envoy-gateway-system, monitoring, argocd, model-serving-prod)
# can all reference the same store. A namespace-scoped SecretStore only
# works for ExternalSecrets in the SAME namespace.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: model-serving-engine
            namespace: model-serving-prod
---
# ExternalSecret — SaaS fallback API keys
# These keys are used by the AI Gateway to authenticate to SaaS LLM providers
# when self-hosted models are unavailable or latency exceeds the failover threshold.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: saas-api-keys
  namespace: envoy-gateway-system
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: ai-gateway-saas-keys
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        openai-gpt4-api-key: "{{ .openai_api_key }}"
        anthropic-claude-api-key: "{{ .anthropic_api_key }}"
        google-vertex-ai-key: "{{ .google_vertex_ai_key }}"
        azure-openai-api-key: "{{ .azure_openai_key }}"
        mistral-api-key: "{{ .mistral_api_key }}"
        cohere-api-key: "{{ .cohere_api_key }}"
        aws-bedrock-api-key: "{{ .aws_bedrock_key }}"
  data:
    - secretKey: openai_api_key
      remoteRef:
        key: saas/openai-api-key
    - secretKey: anthropic_api_key
      remoteRef:
        key: saas/anthropic-api-key
    - secretKey: google_vertex_ai_key
      remoteRef:
        key: saas/google-vertex-ai-key
    - secretKey: azure_openai_key
      remoteRef:
        key: saas/azure-openai-key
    - secretKey: mistral_api_key
      remoteRef:
        key: saas/mistral-api-key
    - secretKey: cohere_api_key
      remoteRef:
        key: saas/cohere-api-key
    - secretKey: aws_bedrock_key
      remoteRef:
        key: saas/aws-bedrock-key
---
# ExternalSecret — Alertmanager config with credentials
# Creates the alertmanager-config secret that kube-prometheus-stack
# references via useExistingSecret.name=alertmanager-config, key=config.yaml.
# The full alertmanager routing config is templated with real credentials
# so Alertmanager doesn't need env var substitution (which it doesn't support).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-config
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: alertmanager-config
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        config.yaml: |
          route:
            group_by: ["alertname", "namespace", "engine_type"]
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 4h
            receiver: "default-receiver"
            routes:
              - match:
                  severity: critical
                receiver: "critical-receiver"
                repeat_interval: 1h
                group_wait: 10s
              - match:
                  severity: warning
                receiver: "warning-receiver"
                repeat_interval: 2h
              - match:
                  component: gpu
                receiver: "gpu-receiver"
                group_by: ["alertname", "instance", "gpu"]
              - match:
                  component: model-serving
                receiver: "serving-receiver"
                group_by: ["alertname", "namespace", "engine_type"]
          receivers:
            - name: default-receiver
              webhook_configs:
                - url: "http://alertmanager-webhook.monitoring:9093/alerts"
                  send_resolved: true
            - name: critical-receiver
              pagerduty_configs:
                - service_key: "{{ .pagerduty_key }}"
                  severity: critical
              slack_configs:
                - api_url: "{{ .slack_webhook }}"
                  channel: "#ml-incidents"
                  title: "[CRITICAL] {{ .GroupLabels.alertname }}"
                  text: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"
            - name: warning-receiver
              slack_configs:
                - api_url: "{{ .slack_webhook }}"
                  channel: "#ml-ops"
                  title: "[WARNING] {{ .GroupLabels.alertname }}"
                  text: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"
            - name: gpu-receiver
              slack_configs:
                - api_url: "{{ .slack_webhook }}"
                  channel: "#gpu-ops"
                  title: "[GPU] {{ .GroupLabels.alertname }}"
                  text: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"
            - name: serving-receiver
              slack_configs:
                - api_url: "{{ .slack_webhook }}"
                  channel: "#ml-ops"
                  title: "[SERVING] {{ .GroupLabels.alertname }}"
                  text: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"
          inhibit_rules:
            - source_match:
                severity: critical
              target_match:
                severity: warning
              equal: ["alertname", "namespace"]
  data:
    - secretKey: pagerduty_key
      remoteRef:
        key: alerting/pagerduty-service-key
    - secretKey: slack_webhook
      remoteRef:
        key: alerting/slack-webhook-url
---
# ExternalSecret — ArgoCD Image Updater GitHub PAT
# Used by ArgoCD Image Updater to commit image tag updates back to the Git repo
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-image-updater-token
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: argocd-image-updater-git
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        GITHUB_TOKEN: "{{ .github_pat }}"
  data:
    - secretKey: github_pat
      remoteRef:
        key: registry/github-pat
---
# ExternalSecret — Container registry pull secret
# Creates a docker-registry Secret for pulling private images
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: registry-pull-secret
  namespace: model-serving-prod
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: registry-credentials
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "ghcr.io": {
                "username": "rustnew",
                "password": "{{ .github_pat }}"
              },
              "docker.io": {
                "username": "{{ .docker_username }}",
                "password": "{{ .docker_password }}"
              }
            }
          }
  data:
    - secretKey: github_pat
      remoteRef:
        key: registry/github-pat
    - secretKey: docker_username
      remoteRef:
        key: registry/docker-username
    - secretKey: docker_password
      remoteRef:
        key: registry/docker-password