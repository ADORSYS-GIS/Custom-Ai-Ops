apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: model-serving-dev
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/rustnew/custom-ai-ops.git
        revision: HEAD
        directories:
          - path: environments/dev
  template:
    metadata:
      name: '{{path.basename}}-dev'
      annotations:
        argocd.argoproj.io/sync-wave: "0"
    spec:
      project: model-serving
      source:
        repoURL: https://github.com/rustnew/custom-ai-ops.git
        targetRevision: HEAD
        path: charts/model-serving-engine
        helm:
          valueFiles:
            - values.yaml
            - ../../environments/dev/values.yaml
          parameters:
            - name: global.namespace
              value: model-serving-dev
      destination:
        server: https://kubernetes.default.svc
        namespace: model-serving-dev
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 2m
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ai-gateway-dev
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - name: ai-gateway
            wave: "1"
  template:
    metadata:
      name: '{{name}}-dev'
      annotations:
        argocd.argoproj.io/sync-wave: '{{wave}}'
    spec:
      project: model-serving
      source:
        repoURL: https://github.com/rustnew/custom-ai-ops.git
        targetRevision: HEAD
        path: charts/ai-gateway
        helm:
          valueFiles:
            - values.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: envoy-gateway-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 3
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 2m