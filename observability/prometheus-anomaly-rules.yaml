apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: model-serving-anomaly-rules
  namespace: monitoring
  labels:
    prometheus: k8s
    role: alert-rules
spec:
  groups:
    - name: model-serving.latency
      rules:
        - alert: ModelServingHighLatency
          expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job="model-serving-engine",namespace="model-serving-prod"}[5m])) by (le)) > 2.0
          for: 3m
          labels:
            severity: warning
            component: model-serving
          annotations:
            summary: "Model serving p95 latency exceeds 2s"
            description: "The 95th percentile latency for model serving is {{ $value }}s, exceeding the 2s threshold."

        - alert: ModelServingCriticalLatency
          expr: histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job="model-serving-engine",namespace="model-serving-prod"}[5m])) by (le)) > 5.0
          for: 2m
          labels:
            severity: critical
            component: model-serving
          annotations:
            summary: "Model serving p99 latency exceeds 5s"
            description: "The 99th percentile latency for model serving is {{ $value }}s, exceeding the 5s threshold. Failover should trigger."

    - name: model-serving.errors
      rules:
        - alert: ModelServingHighErrorRate
          expr: sum(rate(http_requests_total{job="model-serving-engine",namespace="model-serving-prod",code=~"5.."}[5m])) / sum(rate(http_requests_total{job="model-serving-engine",namespace="model-serving-prod"}[5m])) > 0.05
          for: 5m
          labels:
            severity: warning
            component: model-serving
          annotations:
            summary: "Model serving error rate above 5%"
            description: "The 5xx error rate is {{ $value | humanizePercentage }}, exceeding the 5% threshold."

        - alert: ModelServingCriticalErrorRate
          expr: sum(rate(http_requests_total{job="model-serving-engine",namespace="model-serving-prod",code=~"5.."}[5m])) / sum(rate(http_requests_total{job="model-serving-engine",namespace="model-serving-prod"}[5m])) > 0.15
          for: 3m
          labels:
            severity: critical
            component: model-serving
          annotations:
            summary: "Model serving error rate above 15%"
            description: "The 5xx error rate is {{ $value | humanizePercentage }}, exceeding the 15% threshold. Auto-rollback recommended."

    - name: model-serving.gpu
      rules:
        - alert: GPUThermalThrottle
          expr: DCGM_FI_DEV_GPU_TEMP > 85
          for: 5m
          labels:
            severity: warning
            component: gpu
          annotations:
            summary: "GPU thermal throttle imminent"
            description: "GPU {{ $labels.gpu }} on {{ $labels.instance }} is at {{ $value }}°C, approaching throttle threshold."

        - alert: GPUUtilizationLow
          expr: DCGM_FI_DEV_GPU_UTIL < 10
          for: 30m
          labels:
            severity: info
            component: gpu
          annotations:
            summary: "GPU utilization below 10%"
            description: "GPU {{ $labels.gpu }} on {{ $labels.instance }} has been below 10% utilization for 30 minutes. Consider scaling down."

        - alert: GPUMemoryNearExhaustion
          expr: DCGM_FI_DEV_FB_USED / DCGM_FI_DEV_FB_TOTAL > 0.95
          for: 2m
          labels:
            severity: critical
            component: gpu
          annotations:
            summary: "GPU memory above 95%"
            description: "GPU {{ $labels.gpu }} memory usage is at {{ $value | humanizePercentage }}."

        - alert: GPUEccErrors
          expr: increase(DCGM_FI_DEV_ECC_ERRORS{error_type="corrected"}[1h]) > 100
          for: 5m
          labels:
            severity: warning
            component: gpu
          annotations:
            summary: "High GPU ECC error rate"
            description: "GPU {{ $labels.gpu }} has {{ $value }} corrected ECC errors in the last hour."

    - name: model-serving.kv-cache
      rules:
        # --- vLLM KV cache usage percentage ---
        - alert: VLLMKVCacheUsageHigh
          expr: vllm:gpu_cache_usage_perc > 0.85
          for: 30s
          labels:
            severity: warning
            component: kv-cache
          annotations:
            summary: "vLLM KV cache usage above 85%"
            description: "KV cache usage on {{ $labels.instance }} (model: {{ $labels.model_name }}) is {{ $value | humanizePercentage }}. Approaching capacity — reduce concurrency or scale out."

        - alert: VLLMKVCacheUsageCritical
          expr: vllm:gpu_cache_usage_perc >= 1.0
          for: 0s
          labels:
            severity: critical
            component: kv-cache
          annotations:
            summary: "vLLM KV cache FULL — evictions imminent"
            description: "KV cache usage on {{ $labels.instance }} has reached 100%. New requests will be blocked or evicted. Immediate scale-out required."

        # --- Waiting requests queue depth ---
        - alert: VLLMRequestsWaitingHigh
          expr: vllm:num_requests_waiting > 10
          for: 1m
          labels:
            severity: critical
            component: kv-cache
          annotations:
            summary: "vLLM request queue depth above 10"
            description: "{{ $value }} requests are waiting in the queue on {{ $labels.instance }}. The engine cannot keep up — scale out or reduce --max-num-seqs."

        # --- Swap-out blocks (KV cache spilled to CPU RAM) ---
        - alert: VLLMSwapOutBlocksDetected
          expr: increase(vllm:swap_out_blocks[5m]) > 0
          for: 0s
          labels:
            severity: critical
            component: kv-cache
          annotations:
            summary: "vLLM KV cache blocks swapped to CPU"
            description: "{{ $value }} KV cache blocks were swapped out to CPU RAM on {{ $labels.instance }} in the last 5m. This causes severe latency spikes. Increase GPU memory budget or reduce concurrency."

        # --- CPU swap space usage (host-level) ---
        - alert: NodeSwapSpaceUsageHigh
          expr: (1 - (node_memory_SwapFree_bytes / node_memory_SwapTotal_bytes)) > 0.10
          for: 2m
          labels:
            severity: critical
            component: kv-cache
          annotations:
            summary: "Node swap space usage above 10%"
            description: "Swap usage on {{ $labels.instance }} is {{ $value | humanizePercentage }}. GPU nodes should have swap disabled (swapoff -a). Check the gpu-node-swapoff DaemonSet."

        # --- Prefix cache hit rate degradation ---
        - alert: VLLMPrefixCacheHitRateLow
          expr: vllm:gpu_prefix_cache_queries_total > 0 and (sum(rate(vllm:gpu_prefix_cache_hits_total[10m])) / sum(rate(vllm:gpu_prefix_cache_queries_total[10m]))) < 0.20
          for: 10m
          labels:
            severity: warning
            component: kv-cache
          annotations:
            summary: "vLLM prefix cache hit rate below 20%"
            description: "Prefix cache hit rate is {{ $value | humanizePercentage }}. Review prompt structure or check if --enable-prefix-caching is active."

        # --- LMCache retrieve hit rate (local+remote cache retrieval effectiveness) ---
        # Per vllm+lmcache.md §14, correct metric: lmcache:retrieve_hit_rate
        - alert: LMCacheRetrieveHitRateLow
          expr: lmcache:num_retrieve_requests > 0 and lmcache:retrieve_hit_rate < 0.30
          for: 10m
          labels:
            severity: warning
            component: lmcache
          annotations:
            summary: "LMCache retrieve hit rate below 30%"
            description: "LMCache retrieve hit rate is {{ $value | humanizePercentage }} on {{ $labels.instance }}. Investigate whether cache entries are being evicted too aggressively or if prefix matching is misconfigured."

        # --- LMCache lookup hit rate (in-memory lookup before network retrieval) ---
        # Per vllm+lmcache.md §14, correct metric: lmcache:lookup_hit_rate
        - alert: LMCacheLookupHitRateLow
          expr: lmcache:num_store_requests > 0 and lmcache:lookup_hit_rate < 0.20
          for: 15m
          labels:
            severity: warning
            component: lmcache
          annotations:
            summary: "LMCache lookup hit rate below 20%"
            description: "LMCache in-memory lookup hit rate is {{ $value | humanizePercentage }}. The local metadata index may be too small or cache invalidation too aggressive."

        # --- LMCache retrieval latency high (network/disk access too slow) ---
        # Per vllm+lmcache.md §14, correct metric: lmcache:time_to_retrieve
        - alert: LMCacheRetrievalTimeHigh
          expr: lmcache:time_to_retrieve > 0.5
          for: 5m
          labels:
            severity: warning
            component: lmcache
          annotations:
            summary: "LMCache retrieval time above 500ms"
            description: "Average retrieval time is {{ $value }}s on {{ $labels.instance }}. NVMe disk IOPS may be saturated or Redis connection latency is high."

        # --- LMCache local cache usage high (CPU RAM consumed by L1) ---
        # Per vllm+lmcache.md §14, correct metric: lmcache:local_cache_usage
        - alert: LMCacheLocalCacheUsageHigh
          expr: lmcache:local_cache_usage > 0.85 * 1024 * 1024 * 1024
          for: 5m
          labels:
            severity: warning
            component: lmcache
          annotations:
            summary: "LMCache local cache (L1 CPU) usage above 85%"
            description: "Local CPU cache usage is {{ $value | humanize1024 }} on {{ $labels.instance }}. Consider increasing cpuWorkers or reducing chunk_size."

        # --- LMCache remote cache usage high (L2/L3 backend near capacity) ---
        # Per vllm+lmcache.md §14, correct metric: lmcache:remote_cache_usage
        - alert: LMCacheRemoteCacheUsageHigh
          expr: lmcache:remote_cache_usage > 0.85 * 200 * 1024 * 1024 * 1024
          for: 5m
          labels:
            severity: warning
            component: lmcache
          annotations:
            summary: "LMCache remote cache (L2/L3) usage above 85%"
            description: "Remote disk/Redis cache usage is {{ $value | humanize1024 }} on {{ $labels.instance }}. Increase disk maxSize or Redis capacity."

        # --- SafeLMCacheConnectorV1 circuit breaker tripped ---
        # Per vllm+lmcache.md §11.2, after maxFailures consecutive failures,
        # vLLM falls back to native GPU cache. This is recoverable but needs investigation.
        - alert: LMCacheSafeConnectorFallback
          expr: increase(lmcache:connector_fallback_total[5m]) > 0
          for: 0s
          labels:
            severity: critical
            component: lmcache
          annotations:
            summary: "LMCache SafeConnector circuit breaker tripped — vLLM fell back to native GPU cache"
            description: "vLLM on {{ $labels.instance }} has fallen back to native GPU cache after LMCache connector failures. LMCache is NOT serving cache. Investigate LMCache daemon health, ZMQ connectivity (port 5555), and CUDA IPC (hostIPC)."

        # --- LMCache daemon unreachable (connector down) ---
        # Detect when LMCache daemon is down and vLLM cannot establish connection
        - alert: LMCacheConnectorDown
          expr: up{job="lmcache-metrics"} == 0
          for: 2m
          labels:
            severity: critical
            component: lmcache
          annotations:
            summary: "LMCache daemon unreachable on {{ $labels.instance }}"
            description: "LMCache daemon on {{ $labels.instance }} has been unreachable for 2m. Cache operations are not functioning. Check DaemonSet pod status, lmcache server process, and ZMQ port 5555."

        # --- Prefill skip rate (cache hit skipped the prefill computation) ---
        # High prefill skip rate means cache is working well; low means cold starts.
        - alert: VLLMPrefillSkipRateLow
          expr: vllm:num_requests_waiting > 0 and (sum(rate(vllm:gpu_prefix_cache_hits_total[5m])) / sum(rate(vllm:num_requests_admitted_total[5m]))) < 0.10
          for: 15m
          labels:
            severity: info
            component: kv-cache
          annotations:
            summary: "vLLM prefill skip rate below 10% under load"
            description: "Prefill skip rate is {{ $value | humanizePercentage }} while requests are queued. This means most requests are doing full prefill — check if prefix caching and LMCache are working."

        # --- SSM/Mamba-specific: recurrent state allocation failure ---
        # vllm-kv-cache.md §5.3: SSM models use fixed-size recurrent
        # state, NOT paginable KV cache. PagedAttention args must NOT
        # be passed to SSM models — detect misconfiguration.
        - alert: SSMModelPagedAttentionMisconfigured
          expr: kube_pod_container_status_running{namespace="model-serving-prod"} > 0 and on(pod) kube_pod_labels{label_engine_type="ssm"} > 0
          for: 0s
          labels:
            severity: critical
            component: kv-cache
          annotations:
            summary: "SSM/Mamba model deployed with PagedAttention args (mismatch)"
            description: "Pod {{ $labels.pod }} runs an SSM/Mamba model. SSM models do not use paginable KV cache (vllm-kv-cache.md §5.3). Remove --enable-prefix-caching, --block-size, --kv-cache-dtype from engine args and switch to contiguous allocation."

        # --- Cache-aware routing header missing (sticky routing disabled) ---
        - alert: CacheRoutingHeaderAbsent
          expr: sum(rate(nginx_ingress_controller_requests{namespace="envoy-gateway-system",status="200"}[5m])) > 10 and sum(rate(envoy_http_downstream_rq_total[5m])) - sum(rate(http_request_headers_total{header="x-cache-affinity-key"}[5m])) > 1
          for: 5m
          labels:
            severity: info
            component: gateway
          annotations:
            summary: "Cache affinity header absent on requests"
            description: "Requests are reaching the gateway without x-cache-affinity-key header. Cache-aware routing (vllm-kv-cache.md §10.3) is not active — prefix hash routing will not be effective."

    - name: model-serving.pods
      rules:
        - alert: ModelServingPodCrashLooping
          expr: increase(kube_pod_container_status_restarts_total{namespace="model-serving-prod"}[1h]) > 3
          for: 5m
          labels:
            severity: warning
            component: model-serving
          annotations:
            summary: "Model serving pod restarting repeatedly"
            description: "Pod {{ $labels.pod }} has restarted {{ $value }} times in the last hour."

        - alert: ModelServingPodNotReady
          expr: kube_pod_container_status_ready{namespace="model-serving-prod"} == 0
          for: 10m
          labels:
            severity: critical
            component: model-serving
          annotations:
            summary: "Model serving pod not ready for 10m"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has been not ready for 10 minutes."

    - name: model-serving.anomaly
      rules:
        - alert: ModelServingLatencyAnomaly
          expr: deriv(http_request_duration_seconds{job="model-serving-engine",namespace="model-serving-prod",quantile="0.95"}[30m]) > 0.1
          for: 10m
          labels:
            severity: warning
            component: model-serving
          annotations:
            summary: "Model serving latency increasing anomalously"
            description: "The rate of change of p95 latency is {{ $value }}s/s, indicating an upward anomaly."

        - alert: ModelServingThroughputAnomaly
          expr: deriv(sum(rate(http_requests_total{job="model-serving-engine",namespace="model-serving-prod"}[5m]))[30m]) < -0.5
          for: 10m
          labels:
            severity: warning
            component: model-serving
          annotations:
            summary: "Model serving throughput dropping anomalously"
            description: "Request throughput is declining at {{ $value }} req/s/s, indicating a potential issue."