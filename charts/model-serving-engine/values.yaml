global:
  imageRegistry: ""
  imagePullSecrets:
    - name: registry-credentials
  storageClass: ""
  namespace: model-serving

engine:
  type: vllm

  vllm:
    image:
      repository: vllm/vllm-openai
      tag: v0.6.3
      pullPolicy: IfNotPresent
    command: []
    args:
      - --model
      - /models/$(MODEL_NAME)
      - --tensor-parallel-size
      - "1"
      - --max-model-len
      - "4096"
      - --gpu-memory-utilization
      - "0.90"
      - --max-num-seqs
      - "128"
      - --kv-cache-dtype
      - fp8
      - --enable-prefix-caching
      - --block-size
      - "16"
    resources:
      # QoS Guaranteed: requests MUST equal limits for ALL resources (CPU, memory, GPU).
      limits:
        nvidia.com/gpu: 1
        cpu: "4"
        memory: 32Gi
      requests:
        nvidia.com/gpu: 1
        cpu: "4"
        memory: 32Gi
    livenessProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 120
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 5
    readinessProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 10
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 3
    startupProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 60

model:
  name: ""
  volumeSize: 50Gi
  seedCommand: []
  seedImage: ""
  seedImagePullPolicy: IfNotPresent

replicaCount: 1

persistence:
  enabled: true
  storageClass: longhorn
  accessMode: ReadWriteOnce
  size: 50Gi

persistenceRWX:
  enabled: true
  storageClass: longhorn-rwx
  accessMode: ReadWriteMany
  size: 50Gi

imagePullSecrets:
  - name: registry-credentials
serviceAccount:
  create: true
  annotations: {}
  name: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  # KEDA autoscaling on vLLM-specific metrics (recommended for LLM inference).
  # Classic CPU/RAM HPA is inoperant for GPU-bound LLM workloads.
  keda:
    enabled: false
    pollingInterval: 15
    cooldownPeriod: 60
    queueDepthThreshold: "5"       # vllm:num_requests_waiting > 5 → scale out
    cacheUsageThreshold: "0.85"    # vllm:gpu_cache_usage_perc > 0.85 → scale out
  # Legacy HPA fallback (NOT recommended — kept for environments without KEDA)
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
  ingressFrom: []

nodeSelector:
  # Isolate vLLM pods on GPU-only nodes to prevent interference with
  # CPU-only workloads. This label should be applied to all GPU nodes.
  nvidia.com/gpu.present: "true"

# Disable swap on GPU nodes via a DaemonSet (swapoff -a).
# Critical for KV cache stability: if the host swaps KV cache pages to
# CPU RAM, inference latency spikes by 10-100x.
gpuNodeSwapoff: true

# --- LMCache: distributed KV cache middleware ---
# Turns KV cache from per-instance silo into persistent, shareable,
# cluster-wide resource. Enables L1 (CPU) / L2 (NVMe) / L3 (Redis/S3)
# tiered cache hierarchy for cross-pod prefix reuse.
# Up to 15x throughput improvement, 69% prefill cost reduction.
lmcache:
  enabled: false
  image:
    repository: lmcache/lmcache-server
    tag: latest
    pullPolicy: IfNotPresent
  cpuWorkers: 4
  chunkSize: 256
  # Multiprocess mode — LMCache runs as a separate daemon (recommended for prod).
  # vLLM connects via ZMQ (port 5555) + HTTP (port 8080 for health/metrics).
  mp:
    host: "127.0.0.1"
    port: 5555
    transferMode: zmq
  # Enable hostIPC for CUDA IPC between vLLM and LMCache pods.
  hostIPC: true
  # SafeLMCacheConnectorV1 circuit breaker — vLLM falls back to native GPU
  # cache after N consecutive failures (no fate-sharing with LMCache).
  circuitBreaker:
    enabled: true
    maxFailures: 5
  # CacheBlend — non-prefix reuse for RAG workloads.
  # Blends cached KV with partial recomputation for semantic overlap.
  # 3x-4.5x TTFT reduction on RAG (no need for exact prefix match).
  cacheBlend:
    enabled: false
    specialStr: "< Rag_sep >"
    useLayerwise: true
    checkLayers: 1
    recomputeRatios: 0.15
  # vLLM --kv-transfer-config fields.
  # connector: LMCacheMPConnector (recommended) | LMCacheConnectorV1 |
  #            LMCacheConnectorV1Dynamic
  # role: kv_both (unified pool) | kv_producer (prefill pool) |
  #       kv_consumer (decode pool, for PD disaggregation)
  kvTransferConfig:
    connector: LMCacheMPConnector
    role: kv_both
    modulePath: lmcache.integration.vllm
    disableHybridKvCacheManager: false
  # Env presets required by LMCache/vLLM integration.
  # PYTHONHASHSEED=0: deterministic hash ordering (avoids cache mismatches).
  env:
    PYTHONHASHSEED: "0"
  disk:
    enabled: false
    path: /var/lib/lmcache
    hostPath: /var/lib/lmcache
    maxSize: 100GiB
  redis:
    enabled: false
    host: ""
    port: 6379
  s3:
    enabled: false
    endpoint: ""
    bucket: ""
    region: us-east-1
  resources:
    requests:
      cpu: 500m
      memory: 4Gi
    limits:
      cpu: "2"
      memory: 16Gi

# --- SafeTensors cache persistence ---
# Persists KV cache to disk for fast restart: on pod restart, the cache
# is restored directly into the attention layer without re-prefill.
# Up to 136x TTFT reduction (Gemma 3 12B benchmark).
cachePersistence:
  enabled: false
  path: /cache/kv
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 20Gi

tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule

affinity: {}

topologySpreadConstraints: []

extraEnv: []
extraVolumes: []
extraVolumeMounts: []

commonLabels: {}
commonAnnotations: {}

restartPolicy: Always

terminationGracePeriodSeconds: 300

# --- llm-d integration ---
# When enabled, vLLM pods register with the llm-d InferencePool,
# emit KV-cache events for the KV-Cache Indexer, and accept
# cache-aware routing decisions from the EPP.
# See docs/explain/llm-d.md for the full integration guide.
llmD:
  enabled: false
  # InferencePool name that this pool registers with
  inferencePoolName: ""
  # EPP gRPC endpoint for cache-aware routing
  eppEndpoint: ""
  # Emit KV-cache events for the KV-Cache Indexer
  emitKvEvents: false
  # KV-Cache Indexer endpoint (if enabled)
  kvCacheIndexerEndpoint: ""

# --- Disaggregated P/D mode ---
# Splits prefill and decode onto separate pod sets.
# Requires llmD.enabled=true and RDMA/NVLink interconnect
# for KV-cache transfer between prefill and decode pods.
disaggregation:
  enabled: false
  # Role: unified | prefill | decode
  role: unified
  # Prefill-specific args (appended when role=prefill)
  prefill:
    gpuMemoryUtilization: "0.92"
    maxNumSeqs: "32"
  # Decode-specific args (appended when role=decode)
  decode:
    gpuMemoryUtilization: "0.85"
    maxNumSeqs: "256"