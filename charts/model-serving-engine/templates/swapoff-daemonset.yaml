{{- if .Values.gpuNodeSwapoff | default false }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "model-serving-engine.fullname" . }}-swapoff
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "model-serving-engine.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: gpu-node-swapoff
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gpu-node-swapoff
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      # Only schedule on GPU nodes — these are the nodes where swap
      # must be disabled to prevent KV cache blocks from being paged
      # to CPU RAM, which causes severe latency spikes.
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/gpu
          operator: Exists
          effect: NoSchedule
      hostPID: true
      hostNetwork: true
      restartPolicy: Always
      containers:
        - name: swapoff
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Disabling swap on GPU node $(hostname)..."
              # Run swapoff in the host namespace via nsenter
              nsenter -t 1 -m -u -i -n -p -- swapoff -a
              # Verify swap is disabled
              SWAP_STATUS=$(nsenter -t 1 -m -u -i -n -p -- cat /proc/swaps)
              if [ -z "$SWAP_STATUS" ] || [ "$(echo "$SWAP_STATUS" | wc -l)" -le 1 ]; then
                echo "SUCCESS: Swap is disabled on $(hostname)"
              else
                echo "WARNING: Swap still active on $(hostname):"
                echo "$SWAP_STATUS"
              fi
              # Keep the pod running so the DaemonSet stays healthy
              echo "Swapoff complete. Sleeping indefinitely..."
              sleep infinity
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
          securityContext:
            allowPrivilegeEscalation: true
            capabilities:
              add:
                - SYS_ADMIN
                - SYS_PTRACE
            readOnlyRootFilesystem: true
{{- end }}