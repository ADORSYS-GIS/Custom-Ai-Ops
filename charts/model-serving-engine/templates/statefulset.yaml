apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "model-serving-engine.fullname" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "model-serving-engine.labels" . | nindent 4 }}
  annotations:
    {{- include "model-serving-engine.annotations" . | nindent 4 }}
spec:
  serviceName: {{ include "model-serving-engine.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "model-serving-engine.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "model-serving-engine.selectorLabels" . | nindent 8 }}
        engine-type: {{ .Values.engine.type }}
        {{- if .Values.llmD.enabled }}
        llm-d.io/enabled: "true"
        {{- if .Values.llmD.inferencePoolName }}
        llm-d.io/inference-pool: {{ .Values.llmD.inferencePoolName | quote }}
        {{- end }}
        {{- end }}
        {{- if .Values.disaggregation.enabled }}
        llm-d.io/disaggregation-role: {{ .Values.disaggregation.role | default "unified" | quote }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "model-serving-engine.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- if and .Values.lmcache.enabled .Values.lmcache.hostIPC }}
      # hostIPC: mandatory for CUDA IPC between vLLM and LMCache daemon.
      # See docs/explain/vllm+lmcache.md §8.
      hostIPC: true
      {{- end }}
      initContainers:
        {{- if and .Values.model.seedImage .Values.model.seedCommand }}
        - name: model-seed
          image: {{ .Values.model.seedImage }}
          imagePullPolicy: {{ .Values.model.seedImagePullPolicy }}
          command:
            {{- toYaml .Values.model.seedCommand | nindent 12 }}
          volumeMounts:
            - name: model-storage
              mountPath: /models
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
            requests:
              cpu: "1"
              memory: 1Gi
        {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- $img := (include "model-serving-engine.engineImage" . | fromJson) }}
          {{- $resources := (include "model-serving-engine.engineResources" . | fromJson) }}
          {{- $engineType := .Values.engine.type }}
          {{- $args := list }}
<<<<<<< Updated upstream
{{- if eq $engineType "vllm" }}{{- $args = .Values.engine.vllm.args }}{{- end }}
=======
          {{- if eq $engineType "vllm" }}{{- $args = .Values.engine.vllm.args }}{{- end }}
>>>>>>> Stashed changes
          {{- $command := list }}
          {{- if eq $engineType "vllm" }}{{- $command = .Values.engine.vllm.command }}{{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.global.imageRegistry }}{{ if .Values.global.imageRegistry }}/{{ end }}{{ $img.repository }}:{{ $img.tag }}"
          imagePullPolicy: {{ $img.pullPolicy }}
          {{- if $command }}
          command:
            {{- toYaml $command | nindent 12 }}
          {{- end }}
          args:
            {{- $filteredArgs := list }}
            {{- range $arg := $args }}
            {{- if and $.Values.lmcache.enabled (eq $arg "--enable-prefix-caching") }}
            {{- /* Filter out --enable-prefix-caching when LMCache is active - LMCache manages its own prefix cache (vllm+lmcache.md §2). */ -}}
            {{- else }}
            {{- $filteredArgs = append $filteredArgs $arg }}
            {{- end }}
            {{- end }}
            {{- toYaml $filteredArgs | nindent 12 }}
            {{- if and .Values.lmcache.enabled (eq $engineType "vllm") }}
            # --- LMCache integration args (vllm+lmcache.md §2) ---
            # Disable chunked prefill (incompatible with LMCache cache coherence).
            - --enable-chunked-prefill
            - "false"
            # Pass the kv_transfer_config JSON to vLLM.
            - --kv-transfer-config
            - {{ include "model-serving-engine.kvTransferConfig" . | quote }}
            {{- if .Values.lmcache.kvTransferConfig.disableHybridKvCacheManager }}
            - --disable-hybrid-kv-cache-manager
            {{- end }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ include "model-serving-engine.enginePort" . }}
              protocol: TCP
          env:
            - name: MODEL_NAME
              value: {{ .Values.model.name | quote }}
            {{- if .Values.lmcache.enabled }}
            # --- LMCache integration (vllm+lmcache.md §2) ---
            # Enables distributed KV cache sharing across pods/nodes.
            # See docs/explain/vllm-kv-cache.md §4.3 for architecture overview.
            - name: LMCACHE_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: LMCACHE_ENABLED
              value: "true"
            - name: LMCACHE_CONFIG_FILE
              value: /etc/lmcache/lmcache.toml
            # Chunk size must match LMCache daemon config.
            - name: LMCACHE_CHUNK_SIZE
              value: {{ .Values.lmcache.chunkSize | default 256 | quote }}
            # PYTHONHASHSEED=0: deterministic hash ordering — avoids cache
            # mismatches across vLLM workers when keys hash to different orders.
            - name: PYTHONHASHSEED
              value: {{ .Values.lmcache.env.PYTHONHASHSEED | default "0" | quote }}
            # KV transfer role — kv_both (unified pool) | kv_producer (prefill pool, PD disaggregation) | kv_consumer (decode pool).
            # Bible §10.
            - name: VLLM_KV_ROLE
              value: {{ .Values.lmcache.kvTransferConfig.role | default "kv_both" | quote }}
            {{- if .Values.lmcache.cacheBlend.enabled }}
            # CacheBlend env vars (non-prefix KV reuse for RAG, Bible §4.4).
            - name: LMCACHE_ENABLE_BLENDING
              value: "True"
            - name: LMCACHE_BLEND_SPECIAL_STR
              value: {{ .Values.lmcache.cacheBlend.specialStr | default "< Rag_sep >" | quote }}
            - name: LMCACHE_USE_LAYERWISE
              value: {{ .Values.lmcache.cacheBlend.useLayerwise | default true | quote }}
            - name: LMCACHE_BLEND_CHECK_LAYERS
              value: {{ .Values.lmcache.cacheBlend.checkLayers | default 1 | quote }}
            - name: LMCACHE_BLEND_RECOMPUTE_RATIOS
              value: {{ .Values.lmcache.cacheBlend.recomputeRatios | default 0.15 | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.cachePersistence.enabled }}
            # SafeTensors cache persistence: restore KV cache from disk
            # on restart, skipping prefill (up to 136x TTFT reduction).
            - name: VLLM_KV_CACHE_PERSIST_PATH
              value: {{ .Values.cachePersistence.path | default "/cache/kv" | quote }}
            {{- end }}
            {{- if .Values.llmD.enabled }}
            # --- llm-d integration (docs/explain/llm-d.md) ---
            # Registers this vLLM pod with the InferencePool and enables
            # KV-cache event emission for the KV-Cache Indexer.
            - name: LLM_D_ENABLED
              value: "true"
            - name: LLM_D_INFERENCE_POOL
              value: {{ .Values.llmD.inferencePoolName | quote }}
            {{- if .Values.llmD.eppEndpoint }}
            - name: LLM_D_EPP_ENDPOINT
              value: {{ .Values.llmD.eppEndpoint | quote }}
            {{- end }}
            {{- if .Values.llmD.emitKvEvents }}
            - name: LLM_D_KV_EVENTS
              value: "true"
            {{- if .Values.llmD.kvCacheIndexerEndpoint }}
            - name: LLM_D_KV_INDEXER_ENDPOINT
              value: {{ .Values.llmD.kvCacheIndexerEndpoint | quote }}
            {{- end }}
            {{- end }}
            {{- if and .Values.disaggregation.enabled (not .Values.lmcache.enabled) }}
            # --- Disaggregated P/D mode (without LMCache) ---
            # Role: prefill (kv_producer) | decode (kv_consumer) | unified (kv_both)
            - name: VLLM_KV_ROLE
              value: {{ .Values.disaggregation.role | default "unified" | quote }}
            {{- end }}
            {{- end }}
            {{- range .Values.extraEnv }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          resources:
            {{- toYaml $resources | nindent 12 }}
          volumeMounts:
            - name: model-storage
              mountPath: /models
              readOnly: false
            - name: tmp
              mountPath: /tmp
            {{- if .Values.lmcache.enabled }}
            - name: lmcache-shm
              mountPath: /dev/shm
            # LMCache config (read-only) — needed for vLLM to discover MP host/port.
            - name: lmcache-config
              mountPath: /etc/lmcache
              readOnly: true
            {{- end }}
            {{- if .Values.cachePersistence.enabled }}
            - name: cache-persistence
              mountPath: {{ .Values.cachePersistence.path | default "/cache/kv" }}
            {{- end }}
            {{- range .Values.extraVolumeMounts }}
            - name: {{ .name }}
              mountPath: {{ .mountPath }}
              {{- if .subPath }}
              subPath: {{ .subPath }}
              {{- end }}
            {{- end }}
          {{- $engineType := .Values.engine.type }}
          {{- if eq $engineType "vllm" }}
          livenessProbe:
            {{- toYaml .Values.engine.vllm.livenessProbe | nindent 12 }}
          {{- if .Values.engine.vllm.readinessProbe }}
          readinessProbe:
            {{- toYaml .Values.engine.vllm.readinessProbe | nindent 12 }}
          {{- end }}
          startupProbe:
            {{- toYaml .Values.engine.vllm.startupProbe | nindent 12 }}
          {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.lmcache.enabled }}
        - name: lmcache-shm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
        # LMCache config (sourced from ConfigMap, read-only).
        - name: lmcache-config
          configMap:
            name: {{ include "model-serving-engine.fullname" . }}-lmcache-config
        {{- end }}
        {{- range .Values.extraVolumes }}
        - name: {{ .name }}
          {{- if .configMap }}
          configMap:
            name: {{ .configMap.name }}
            {{- if .configMap.items }}
            items:
              {{- toYaml .configMap.items | nindent 14 }}
            {{- end }}
          {{- else if .secret }}
          secret:
            secretName: {{ .secret.secretName }}
          {{- else if .emptyDir }}
          emptyDir: {}
          {{- end }}
        {{- end }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      {{- if .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml .Values.topologySpreadConstraints | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: model-storage
        labels:
          {{- include "model-serving-engine.selectorLabels" . | nindent 10 }}
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
    {{- if .Values.cachePersistence.enabled }}
    - metadata:
        name: cache-persistence
        labels:
          {{- include "model-serving-engine.selectorLabels" . | nindent 10 }}
      spec:
        accessModes:
          - {{ .Values.cachePersistence.accessMode | default "ReadWriteOnce" }}
        {{- if .Values.cachePersistence.storageClass }}
        storageClassName: {{ .Values.cachePersistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.cachePersistence.size | default "20Gi" }}
    {{- end }}