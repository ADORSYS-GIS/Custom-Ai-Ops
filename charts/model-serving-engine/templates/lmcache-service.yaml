{{- if .Values.lmcache.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "model-serving-engine.fullname" . }}-lmcache
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "model-serving-engine.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: lmcache
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    # ZMQ — cache transfer protocol for vLLM ↔ LMCache communication.
    - name: zmq
      port: 5555
      targetPort: 5555
      protocol: TCP
    # HTTP — health checks, readiness, admin API.
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
{{- end }}