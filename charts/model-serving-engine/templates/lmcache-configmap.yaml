{{- if .Values.lmcache.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "model-serving-engine.fullname" . }}-lmcache-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "model-serving-engine.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
data:
  lmcache.toml: |
    # LMCache configuration — distributed KV cache middleware
    # Turns the KV cache from a per-instance silo into a persistent,
    # shareable, cluster-wide resource. See docs/explain/bible-kv-cache.md §4.3.

    [lmcache]
    # Engine-independent daemon: survives inference engine restarts.
    chunk_size = {{ .Values.lmcache.chunkSize | default 256 }}
    local_cpu = true

    # --- L1: CPU DRAM (always-on, fastest tier after VRAM) ---
    # Capacity 5-10x the VRAM; ~5 µs latency.
    [local_cpu]
    num_cpus = {{ .Values.lmcache.cpuWorkers | default 4 }}

    # --- L2: Local NVMe disk (warm cache, capacity 2-4 TB) ---
    # 100-500 µs latency. Survives pod restarts.
    {{- if .Values.lmcache.disk.enabled }}
    [local_disk]
    path = "{{ .Values.lmcache.disk.path | default "/var/lib/lmcache" }}"
    max_size = "{{ .Values.lmcache.disk.maxSize | default "100GiB" }}"
    {{- end }}

    # --- L3: Distributed storage (Redis / Mooncake / S3) ---
    # Cluster-wide sharing; 5-15 ms (Redis) to tens of ms (S3).
    # Enables cross-pod, cross-node cache reuse from the same prefix.
    {{- if .Values.lmcache.redis.enabled }}
    [redis]
    host = "{{ .Values.lmcache.redis.host }}"
    port = {{ .Values.lmcache.redis.port | default 6379 }}
    {{- end }}

    {{- if .Values.lmcache.s3.enabled }}
    [s3]
    endpoint = "{{ .Values.lmcache.s3.endpoint }}"
    bucket = "{{ .Values.lmcache.s3.bucket }}"
    region = "{{ .Values.lmcache.s3.region | default "us-east-1" }}"
    {{- end }}

    # --- Multiprocess mode (MP) — LMCache runs as an independent daemon ---
    # vLLM connects via ZMQ (port 5555) for cache transfer and
    # HTTP (port 8080) for health/metrics. See vllm+lmcache.md §3.2.
    [mp]
    host = "{{ .Values.lmcache.mp.host | default "127.0.0.1" }}"
    port = {{ .Values.lmcache.mp.port | default 5555 }}
    transfer_mode = "{{ .Values.lmcache.mp.transferMode | default "zmq" }}"

    # --- SafeLMCacheConnectorV1 circuit breaker ---
    # After max_failures consecutive failures, vLLM falls back to
    # native GPU PagedAttention (no fate-sharing with LMCache daemon).
    [circuit_breaker]
    enabled = {{ .Values.lmcache.circuitBreaker.enabled | default true }}
    max_failures = {{ .Values.lmcache.circuitBreaker.maxFailures | default 5 }}

    # --- CacheBlend: non-prefix KV reuse for RAG workloads ---
    # Blends cached KV with partial recomputation for semantic overlap.
    # 3x-4.5x TTFT reduction on RAG (no need for exact prefix match).
    # Bible §4.4.
    {{- if .Values.lmcache.cacheBlend.enabled }}
    [cache_blend]
    enable = true
    special_str = "{{ .Values.lmcache.cacheBlend.specialStr | default "< Rag_sep >" }}"
    use_layerwise = {{ .Values.lmcache.cacheBlend.useLayerwise | default true }}
    check_layers = {{ .Values.lmcache.cacheBlend.checkLayers | default 1 }}
    recompute_ratios = {{ .Values.lmcache.cacheBlend.recomputeRatios | default 0.15 }}
    {{- end }}

    # --- Observability: enable Prometheus metrics on :8330/metrics ---
    [observability]
    enable = true
    metrics_host = "0.0.0.0"
    metrics_port = 8330
{{- end }}