{{- if .Values.lmcache.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "model-serving-engine.fullname" . }}-cache-invalidation
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "model-serving-engine.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  invalidation-policy.md: |
    # KV Cache Invalidation Policy
    
    Reference: docs/explain/vllm-kv-cache.md §11.5 "Cache freshness"
    and §13 "Audit periodically".
    
    ## When to invalidate the KV cache
    
    A stale cache (e.g. updated RAG knowledge base) becomes a source
    of silent errors. The cache MUST be invalidated when:
    
    1. **RAG corpus update**: when the underlying knowledge base is
       updated, the system prompts embedding the RAG context will
       produce stale answers. Trigger invalidation by bumping the
       `x-rag-version` header on the gateway — the prefix hash
       changes, routing new requests to fresh cache entries.
    
    2. **Model weight update**: when a new model version is deployed,
       all KV cache entries are invalid (weights changed → different
       K/V projections). The StatefulSet rolling update naturally
       discards old cache. SafeTensors persistence paths include the
       model version in the directory name to prevent stale reads.
    
    3. **System prompt change**: changes to system prompts invalidate
       the prefix cache for that prompt. The prefix-hash routing
       header automatically handles this — a new prompt produces a
       new hash → new affinity key → new cache entries.
    
    4. **Scheduled periodic audit**: per vllm-kv-cache.md §12.2,
       re-evaluate cache hit rate quarterly. If hit rate drops below
       target (e.g. <20% for 10m), trigger a manual cache flush:
       `kubectl rollout restart statefulset <name> -n <ns>`
    
    ## How to invalidate
    
    ### Soft invalidation (preferred, zero downtime)
    - Bump `x-rag-version` header value at the gateway
    - The prefix-hash routing Lua filter incorporates this header
      into the hash → new requests get new affinity keys → new cache
    - Old cache entries age out via LRU eviction
    
    ### Hard invalidation (full flush)
    - `kubectl rollout restart statefulset -n <namespace>`
    - For LMCache L2/L3: flush Redis (`FLUSHDB`) or delete S3 prefix
    - For SafeTensors persistence: delete the PVC or the version dir
    
    ## Monitoring cache freshness
    
    - Alert `VLLMPrefixCacheHitRateLow` (hit rate < 20% for 10m)
      may indicate stale cache being evicted faster than used
    - Alert `VLLMKVCacheUsageCritical` (>= 100%) indicates cache
      pressure — investigate whether invalidation is too slow
{{- end }}