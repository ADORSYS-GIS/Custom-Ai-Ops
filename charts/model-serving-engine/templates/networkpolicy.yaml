{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "model-serving-engine.fullname" . }}-netpol
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "model-serving-engine.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "model-serving-engine.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- range .Values.networkPolicy.ingressFrom }}
        - {{ toYaml . | nindent 10 }}
        {{- end }}
      ports:
        - port: {{ include "model-serving-engine.enginePort" . }}
          protocol: TCP
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}