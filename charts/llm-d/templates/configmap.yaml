{{- if .Values.router.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "llm-d.router.fullname" . }}-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "llm-d.labels" . | nindent 4 }}
data:
  epp-config.json: |-
{{ include "llm-d.eppConfig" . | indent 4 }}
  envoy.yaml: |-
    admin:
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9901
    static_resources:
      listeners:
        - name: inference_listener
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 8080
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: inference
                    route_config:
                      name: local_route
                      virtual_hosts:
                        - name: inference_service
                          domains: ["*"]
                          routes:
                            - match: { prefix: "/" }
                              route:
                                cluster: vllm_backend
                                timeout: 30s
                    http_filters:
                      - name: envoy.filters.http.ext_proc
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                          grpc_service:
                            envoy_grpc:
                              cluster_name: epp_backend
                          processing_mode:
                            request_header_mode: SEND
                            response_header_mode: SKIP
                          message_timeout: 2s
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters:
        - name: epp_backend
          type: STATIC
          connect_timeout: 0.25s
          http2_protocol_options: {}
          load_assignment:
            cluster_name: epp_backend
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: 127.0.0.1
                          port_value: 9002
        - name: vllm_backend
          type: STRICT_DNS
          connect_timeout: 1s
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: vllm_backend
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ .Values.inferencePool.targetService.name | default "model-serving-engine" }}
                          port_value: {{ .Values.inferencePool.targetService.port | default 80 }}
{{- end }}