{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "llm-d-router.fullname" . }}
  labels:
    {{- include "llm-d-router.labels" . | nindent 4 }}
rules:
  # Watch InferencePool resources
  - apiGroups: ["inference.networking.x-k8s.io"]
    resources: ["inferencepools"]
    verbs: ["get", "list", "watch"]
  
  # Read InferencePool status
  - apiGroups: ["inference.networking.x-k8s.io"]
    resources: ["inferencepools/status"]
    verbs: ["get"]
  
  # Get/List pods to discover endpoints
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  
  # Get/List services
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
  
  # Read pod metrics (if metrics-server installed)
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
  
  # Read Gateway resources
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways", "httproutes"]
    verbs: ["get", "list", "watch"]
{{- end }}
