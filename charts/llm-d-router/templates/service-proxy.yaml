{{- if .Values.proxy.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "llm-d-router.fullname" . }}-proxy
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "llm-d-router.proxyLabels" . | nindent 4 }}
  {{- with .Values.proxy.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.proxy.service.type }}
  ports:
    - port: {{ .Values.proxy.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "llm-d-router.proxySelectorLabels" . | nindent 4 }}
{{- end }}
