apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "redis.fullname" . }}-config
  namespace: {{ include "redis.namespace" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
  annotations:
    {{- include "redis.annotations" . | nindent 4 }}
data:
  redis.conf: |
    # Redis configuration for LMCache L3 distributed KV cache
    # Auto-generated by Custom-Ai-Ops Redis chart v{{ .Chart.Version }}

    # --- Networking ---
    bind 0.0.0.0
    port {{ .Values.service.primary.port }}
    protected-mode yes
    tcp-backlog 511
    timeout 0
    tcp-keepalive 300

    # --- Memory management ---
    maxmemory {{ .Values.config.maxmemory }}
    maxmemory-policy {{ .Values.config.maxmemoryPolicy }}
    maxmemory-samples 10

    # --- Persistence ---
    appendonly {{ .Values.config.appendonly }}
    appendfilename "appendonly.aof"
    auto-aof-rewrite-percentage 100
    auto-aof-rewrite-min-size 64mb
    save {{ .Values.config.save | default "" }}

    # --- Replication (used in sentinel mode) ---
    {{- if eq .Values.architecture "sentinel" }}
    replica-read-only yes
    repl-diskless-sync yes
    repl-diskless-sync-delay 5
    {{- end }}

    # --- Keyspace events (for KV-cache indexer) ---
    notify-keyspace-events KEA

    # --- Logging ---
    loglevel notice
    logfile ""

    # --- Performance ---
    hz 10
    aof-use-rdb-preamble yes
    lazyfree-lazy-eviction yes
    lazyfree-lazy-expire yes
    lazyfree-lazy-server-del yes

    {{- if .Values.config.extraLines }}
    # --- Extra config ---
    {{ .Values.config.extraLines | nindent 4 }}
    {{- end }}
