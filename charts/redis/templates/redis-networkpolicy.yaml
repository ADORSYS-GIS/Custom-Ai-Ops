{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "redis.fullname" . }}-netpol
  namespace: {{ include "redis.namespace" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "redis.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ include "redis.namespace" . }}
      ports:
        - port: {{ .Values.service.primary.port }}
          protocol: TCP
        {{- if eq .Values.architecture "sentinel" }}
        - port: 26379
          protocol: TCP
        {{- end }}
{{- end }}
