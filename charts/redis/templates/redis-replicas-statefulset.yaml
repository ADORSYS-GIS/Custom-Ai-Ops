{{- if eq .Values.architecture "sentinel" }}
# --- Sentinel mode: Redis replicas (N replicas, read-only copies) ---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "redis.fullname" . }}-replicas
  namespace: {{ include "redis.namespace" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
    redis.io/role: replica
  annotations:
    {{- include "redis.annotations" . | nindent 4 }}
spec:
  serviceName: {{ include "redis.headlessServiceName" . }}
  replicas: {{ .Values.replica.replicaCount }}
  selector:
    matchLabels:
      {{- include "redis.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
      redis.io/role: replica
  template:
    metadata:
      labels:
        {{ include "redis.replicaLabels" . | nindent 8 }}
      annotations:
        {{- include "redis.annotations" . | nindent 8 }}
        checksum/config: {{ include (print $.Template.BasePath "/redis-configmap.yaml") . | sha256sum }}
    spec:
      {{- if .Values.global.imageRegistry }}
      imagePullSecrets:
        - name: registry-credentials
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.replica.nodeSelector }}
      nodeSelector:
        {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.replica.tolerations }}
      tolerations:
        {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.replica.affinity }}
      affinity:
        {{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: redis
          image: "{{ .Values.global.imageRegistry }}{{ if .Values.global.imageRegistry }}/{{ end }}{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              MASTER_HOST="${REPLICA_MASTER_HOST:-{{ include "redis.fullname" . }}-primary-0.{{ include "redis.headlessServiceName" . }}.{{ include "redis.namespace" . }}.svc.cluster.local}"
              MASTER_PORT="${REPLICA_MASTER_PORT:-{{ .Values.service.primary.port }}}"
              echo "Replica starting — connecting to master at $MASTER_HOST:$MASTER_PORT"
              redis-server /etc/redis/redis.conf \
                --replicaof "$MASTER_HOST" "$MASTER_PORT"
          ports:
            - name: redis
              containerPort: {{ .Values.service.primary.port }}
              protocol: TCP
          env:
            {{- if .Values.auth.enabled }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "redis.secretName" . }}
                  key: {{ include "redis.secretPasswordKey" . }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/redis/redis.conf
              subPath: redis.conf
            - name: data
              mountPath: /data
          {{- if .Values.probes.enabled }}
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.failureThreshold }}
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - redis-cli ping | grep -q PONG
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          resources:
            {{- toYaml .Values.replica.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "redis.fullname" . }}-config
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "redis.labels" . | nindent 10 }}
      spec:
        accessModes: {{ .Values.replica.persistence.accessModes }}
        {{- if .Values.replica.persistence.storageClass }}
        storageClassName: {{ .Values.replica.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.replica.persistence.size }}
{{- end }}
