{{- if and .Values.job.enabled .Values.job.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "llm-d-infrastructure.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-d-infrastructure.labels" . | nindent 4 }}
  {{- with .Values.job.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
