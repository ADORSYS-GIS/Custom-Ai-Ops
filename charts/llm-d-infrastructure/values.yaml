# Gateway API and GAIE Infrastructure Configuration

# Gateway API CRDs version
gatewayAPI:
  enabled: true
  version: "v1.2.1"
  # URL to Gateway API standard install manifest
  manifestUrl: "https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.1/standard-install.yaml"

# Gateway API Inference Extension (GAIE) CRDs
gaie:
  enabled: true
  version: "v0.3.0"
  # URL to GAIE manifests
  manifestUrl: "https://github.com/kubernetes-sigs/gateway-api-inference-extension/releases/download/v0.3.0/manifests.yaml"

# Job configuration for CRD installation
job:
  # Use a job to install CRDs (safer for Helm lifecycle)
  enabled: true
  image: "bitnami/kubectl:1.30"
  imagePullPolicy: IfNotPresent
  
  # ServiceAccount for the job
  serviceAccount:
    create: true
    name: llm-d-crd-installer
    annotations: {}
  
  # Backoff limit
  backoffLimit: 3
  
  # TTL after finished (cleanup)
  ttlSecondsAfterFinished: 300
  
  # Resource limits
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# Alternative: apply CRDs directly (not recommended in Helm)
# If job.enabled=false, this will create CRD resources directly
directApply:
  enabled: false
