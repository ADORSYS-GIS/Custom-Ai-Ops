global:
  namespace: model-serving
  imageRegistry: ""
  imagePullSecrets:
    - name: registry-credentials

engine:
  type: onnxGenai

image:
  repository: ghcr.io/microsoft/onnxruntime-genai
  tag: "0.5.0"
  pullPolicy: IfNotPresent

command: []
args:
  - --model_path
  - /models/$(MODEL_NAME)
  - --port
  - "8080"

model:
  name: ""
  volumeSize: 50Gi
  seedImage: ""
  seedImagePullPolicy: IfNotPresent
  seedCommand: []

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  limits:
    nvidia.com/gpu: 1
    cpu: "4"
    memory: 16Gi
  requests:
    nvidia.com/gpu: 1
    cpu: "4"
    memory: 16Gi

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 60
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 6

readinessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 90

replicaCount: 1

persistence:
  enabled: true
  storageClass: longhorn
  accessMode: ReadWriteOnce
  size: 50Gi

persistenceRWX:
  enabled: true
  storageClass: longhorn-rwx
  accessMode: ReadWriteMany
  size: 50Gi

podDisruptionBudget:
  enabled: true
  minAvailable: 1

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 80

nodeSelector:
  nvidia.com/gpu.present: "true"

tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule

serviceAccount:
  create: true
  annotations: {}
  name: ""

affinity: {}

topologySpreadConstraints: []