{{- if .Values.gateway }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "ai-gateway.fullname" . }}
  namespace: {{ .Values.gateway.namespace }}
  labels:
    {{- include "ai-gateway.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
      sectionName: https
  hostnames:
    - {{ .Values.gateway.hostname }}
  rules:
    {{- range .Values.models }}
    - matches:
        - path:
            type: PathPrefix
            value: /v1/chat/completions
          headers:
            - type: Exact
              name: x-model
              value: {{ .name }}
      # Sticky routing by prefix hash: requests with the same prompt prefix
      # are routed to the same backend pod to maximize KV cache hit rate.
      # This leverages vLLM's --enable-prefix-caching by ensuring that
      # repeated system prompts / few-shot examples land on the same replica.
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            add:
              - name: x-sticky-session-key
                value: "{{ .name }}"
      backendRefs:
        {{- range .backends }}
        - name: {{ .ref }}
          port: 80
          weight: {{ .weight | default 100 }}
        {{- end }}
        {{- if and .fallback .fallback.enabled }}
        - name: {{ .fallback.backendRef }}
          port: 443
          weight: 0
        {{- end }}
      timeouts:
        request: {{ $.Values.rateLimit.requestTimeout | default "10s" | quote }}
        backendRequest: {{ $.Values.rateLimit.backendRequestTimeout | default "8s" | quote }}
    {{- end }}
{{- end }}