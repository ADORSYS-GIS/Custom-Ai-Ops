global:
  namespace: llm-d-system

# Prod: full llm-d stack (EPP + KV-Cache Indexer, Phase 2)
router:
  enabled: true
  replicaCount: 3
  epp:
    plugin: prefix-cache
    minReplicas: 2
    scoringWeights:
      cacheHit: 0.7
      queueDepth: 0.2
      gpuUtilization: 0.1
    maxInflightPerReplica: 128
  serviceMonitor:
    enabled: true
    interval: 10s
    scrapeTimeout: 5s
    releaseLabel: prometheus
  pdb:
    enabled: true
    minAvailable: 2
  resources:
    limits:
      cpu: "4"
      memory: 8Gi
    requests:
      cpu: "1"
      memory: 2Gi

kvCacheIndexer:
  enabled: true
  replicaCount: 1
  storage:
    type: redis
    redis:
      host: "redis-cache.monitoring.svc.cluster.local"
      port: 6379
  reconcileInterval: 5s
  serviceMonitor:
    enabled: true
    releaseLabel: prometheus

inferencePool:
  enabled: true
  modelName: ""
  targetService:
    name: ""
    port: 80

# Disaggregation: disabled by default (requires RDMA/NVLink)
disaggregation:
  enabled: false