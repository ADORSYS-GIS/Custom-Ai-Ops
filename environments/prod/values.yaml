global:
  namespace: model-serving-prod

engine:
  vllm:
    args:
      - --model
      - /models/$(MODEL_NAME)
      - --tensor-parallel-size
      - "1"
      - --max-model-len
      - "8192"
      - --gpu-memory-utilization
      - "0.90"
      - --max-num-seqs
      - "256"
      - --kv-cache-dtype
      - fp8
      - --enable-prefix-caching
      - --block-size
      - "16"
      # Note: --enable-chunked-prefill is DISABLED when LMCache is enabled
      # (StatefulSet template forces it to false for LMCache cache coherence)
      # llm-d cache-aware routing works with LMCache's prefix cache management
      # Future: add --kv-cache-event-endpoint when KV-Cache Indexer is deployed
      # - --kv-cache-event-endpoint
      # - "http://llm-d-kv-cache-indexer.llm-d-system.svc.cluster.local:8080/events"
    resources:
      # QoS Guaranteed: requests MUST equal limits for ALL resources (CPU, memory, GPU).
      # This prevents the host OOM killer from evicting vLLM pods during KV cache pressure.
      limits:
        nvidia.com/gpu: 1
        cpu: "8"
        memory: 32Gi
      requests:
        nvidia.com/gpu: 1
        cpu: "8"
        memory: 32Gi

replicaCount: 2

persistence:
  storageClass: longhorn
  size: 100Gi

persistenceRWX:
  storageClass: longhorn-rwx
  size: 100Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  keda:
    enabled: true
    pollingInterval: 15
    cooldownPeriod: 60
    queueDepthThreshold: "5"
    cacheUsageThreshold: "0.85"

podDisruptionBudget:
  enabled: true
  minAvailable: 1

tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule
  - key: node-role.kubernetes.io/gpu
    operator: Exists
    effect: NoSchedule

# Isolate vLLM pods on GPU-only nodes (physical IA node isolation)
nodeSelector:
  nvidia.com/gpu.present: "true"

# Disable swap on GPU nodes via DaemonSet (swapoff -a)
gpuNodeSwapoff: true

# --- LMCache: distributed KV cache (L1 CPU / L2 NVMe / L3 Redis) ---
# Enables cross-pod prefix cache sharing — up to 15x throughput, 69% prefill savings.
lmcache:
  enabled: true
  cpuWorkers: 4
  chunkSize: 256
  mp:
    host: "127.0.0.1"
    port: 5555
    transferMode: zmq
  hostIPC: true
  circuitBreaker:
    enabled: true
    maxFailures: 5
  cacheBlend:
    enabled: false
    specialStr: "< Rag_sep >"
    useLayerwise: true
    checkLayers: 1
    recomputeRatios: 0.15
  kvTransferConfig:
    connector: LMCacheMPConnector
    role: kv_both
    modulePath: lmcache.integration.vllm
    disableHybridKvCacheManager: false
  env:
    PYTHONHASHSEED: "0"
  disk:
    enabled: true
    path: /var/lib/lmcache
    hostPath: /var/lib/lmcache
    maxSize: 200GiB
  redis:
    enabled: true
    host: "redis-cache.model-serving-prod.svc.cluster.local"
    port: 6379
  resources:
    requests:
      cpu: 500m
      memory: 8Gi
    limits:
      cpu: "2"
      memory: 16Gi

# --- SafeTensors cache persistence: fast restart skips re-prefill ---
cachePersistence:
  enabled: true
  storageClass: longhorn
  size: 50Gi

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: model-serving-engine

# --- llm-d: full integration (EPP + KV-Cache Indexer, Phase 2) ---
# EPP routes to the replica holding the relevant KV-cache blocks.
# KV-Cache Indexer maintains a cluster-wide cache map for exact routing.
llmD:
  enabled: true
  inferencePoolName: "prod-llm-d"
  eppEndpoint: "prod-llm-d-router.llm-d-system.svc.cluster.local:80"
  emitKvEvents: true
  kvCacheIndexerEndpoint: "prod-llm-d-indexer.llm-d-system.svc.cluster.local:8090"

# --- Disaggregated P/D: disabled by default (requires RDMA) ---
# Enable when H100/H200 nodes with NVLink/RDMA are available.
disaggregation:
  enabled: false
  role: unified
  prefill:
    gpuMemoryUtilization: "0.92"
    maxNumSeqs: "32"
  decode:
    gpuMemoryUtilization: "0.85"
    maxNumSeqs: "256"