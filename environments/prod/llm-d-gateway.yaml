---
# Gateway API Gateway for llm-d routing in production
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: llm-d-gateway-prod
  namespace: model-serving-prod
  labels:
    app.kubernetes.io/name: llm-d
    app.kubernetes.io/component: gateway
    environment: prod
  annotations:
    # Production-grade settings
    gateway.llm-d.io/access-log: "true"
    gateway.llm-d.io/detailed-metrics: "true"
    gateway.llm-d.io/circuit-breaker: "true"
    gateway.llm-d.io/rate-limit: "1000"  # 1000 req/s per client
spec:
  gatewayClassName: llm-d-gateway-class
  
  listeners:
    - name: http
      protocol: HTTP
      port: 8080
      allowedRoutes:
        namespaces:
          from: Same
        kinds:
          - group: gateway.networking.k8s.io
            kind: HTTPRoute
      
      hostname: "*.prod.example.com"
    
    # HTTPS listener for production (requires cert-manager)
    - name: https
      protocol: HTTPS
      port: 8443
      allowedRoutes:
        namespaces:
          from: Same
        kinds:
          - group: gateway.networking.k8s.io
            kind: HTTPRoute
      
      hostname: "*.prod.example.com"
      
      tls:
        mode: Terminate
        certificateRefs:
          - name: llm-d-gateway-tls
            kind: Secret

---
# HTTPRoute for routing inference requests through llm-d Router (Production)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm-d-inference-route-prod
  namespace: model-serving-prod
  labels:
    app.kubernetes.io/name: llm-d
    app.kubernetes.io/component: httproute
    environment: prod
  annotations:
    gateway.llm-d.io/log-level: "info"
    gateway.llm-d.io/retry-policy: "exponential"
spec:
  parentRefs:
    - name: llm-d-gateway-prod
      namespace: model-serving-prod
      sectionName: http
    - name: llm-d-gateway-prod
      namespace: model-serving-prod
      sectionName: https
  
  # Production hostnames
  hostnames:
    - "inference.prod.example.com"
    - "api.prod.example.com"
  
  # Route OpenAI-compatible inference requests
  rules:
    # Rule 1: Chat completions with cache-aware routing + retries
    - matches:
        - path:
            type: PathPrefix
            value: /v1/chat/completions
          method: POST
      
      # Apply ext-proc filter for cache-aware routing
      filters:
        - type: ExtensionRef
          extensionRef:
            group: inference.networking.x-k8s.io
            kind: EndpointPicker
            name: llm-d-epp
            namespace: llm-d-system
        
        # Add production headers
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Request-Timeout
                value: "180"
              - name: X-Cache-Aware-Routing
                value: "enabled"
              - name: X-Priority
                value: "high"
              - name: X-SLO-Target-TTFT-P99
                value: "500ms"
            add:
              - name: X-Request-ID
                value: "${request.id}"
              - name: X-Forwarded-For
                value: "${client.ip}"
      
      backendRefs:
        - group: inference.networking.x-k8s.io
          kind: InferencePool
          name: vllm-prod-pool
          port: 8000
          weight: 100
      
      # Production timeout: 3 minutes for long-context requests
      timeouts:
        request: 180s
        backendRequest: 175s
      
      # Retry policy for transient failures
      retries:
        maxRetries: 2
        retryOn:
          - connect-failure
          - unavailable
          - retriable-status-codes
        retryStatusCodes:
          - 503
          - 504
        backoff:
          baseInterval: 100ms
          maxInterval: 1s
    
    # Rule 2: Completions (legacy OpenAI API)
    - matches:
        - path:
            type: PathPrefix
            value: /v1/completions
          method: POST
      
      filters:
        - type: ExtensionRef
          extensionRef:
            group: inference.networking.x-k8s.io
            kind: EndpointPicker
            name: llm-d-epp
            namespace: llm-d-system
        
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Request-Timeout
                value: "180"
              - name: X-Cache-Aware-Routing
                value: "enabled"
              - name: X-Priority
                value: "high"
      
      backendRefs:
        - group: inference.networking.x-k8s.io
          kind: InferencePool
          name: vllm-prod-pool
          port: 8000
      
      timeouts:
        request: 180s
        backendRequest: 175s
      
      retries:
        maxRetries: 2
        retryOn:
          - connect-failure
          - unavailable
          - retriable-status-codes
        retryStatusCodes:
          - 503
          - 504
        backoff:
          baseInterval: 100ms
          maxInterval: 1s
    
    # Rule 3: Embeddings (if supported by model)
    - matches:
        - path:
            type: PathPrefix
            value: /v1/embeddings
          method: POST
      
      filters:
        - type: ExtensionRef
          extensionRef:
            group: inference.networking.x-k8s.io
            kind: EndpointPicker
            name: llm-d-epp
            namespace: llm-d-system
      
      backendRefs:
        - group: inference.networking.x-k8s.io
          kind: InferencePool
          name: vllm-prod-pool
          port: 8000
      
      timeouts:
        request: 60s
    
    # Rule 4: Health checks (direct passthrough, no EPP, no retries)
    - matches:
        - path:
            type: Exact
            value: /health
          method: GET
      
      backendRefs:
        - group: inference.networking.x-k8s.io
          kind: InferencePool
          name: vllm-prod-pool
          port: 8000
      
      timeouts:
        request: 5s
    
    # Rule 5: Readiness checks
    - matches:
        - path:
            type: Exact
            value: /ready
          method: GET
      
      backendRefs:
        - group: inference.networking.x-k8s.io
          kind: InferencePool
          name: vllm-prod-pool
          port: 8000
      
      timeouts:
        request: 5s
    
    # Rule 6: Metrics (direct passthrough, no EPP)
    - matches:
        - path:
            type: Exact
            value: /metrics
          method: GET
      
      backendRefs:
        - group: inference.networking.x-k8s.io
          kind: InferencePool
          name: vllm-prod-pool
          port: 8000
      
      timeouts:
        request: 10s
    
    # Rule 7: Model info (direct passthrough)
    - matches:
        - path:
            type: PathPrefix
            value: /v1/models
          method: GET
      
      backendRefs:
        - group: inference.networking.x-k8s.io
          kind: InferencePool
          name: vllm-prod-pool
          port: 8000
      
      timeouts:
        request: 10s

---
# InferenceObjective: Define production SLO targets
apiVersion: inference.networking.x-k8s.io/v1alpha2
kind: InferenceObjective
metadata:
  name: prod-high-priority-objective
  namespace: model-serving-prod
  labels:
    app.kubernetes.io/name: llm-d
    environment: prod
    priority: high
spec:
  # Target this objective to production pool
  targetRef:
    group: inference.networking.x-k8s.io
    kind: InferencePool
    name: vllm-prod-pool
  
  # Strict performance objectives for production
  objectives:
    - name: ttft-p50
      metric: time_to_first_token_p50
      targetValue: "200ms"
      weight: 0.3
    
    - name: ttft-p99
      metric: time_to_first_token_p99
      targetValue: "500ms"
      weight: 0.4
      # Violation triggers alert
      violationAction: alert
    
    - name: throughput
      metric: tokens_per_second
      targetValue: "2000"
      weight: 0.2
    
    - name: cache-hit-rate
      metric: cache_hit_rate
      targetValue: "0.6"  # 60% cache hit rate in production
      weight: 0.1
  
  # High priority class
  priority: high
  
  # Enforcement policy
  enforcement:
    mode: hard  # Reject requests if SLO cannot be met
    gracePeriodSeconds: 300  # 5 minutes grace period before enforcement

---
# InferenceObjective: Medium priority for background/batch requests
apiVersion: inference.networking.x-k8s.io/v1alpha2
kind: InferenceObjective
metadata:
  name: prod-medium-priority-objective
  namespace: model-serving-prod
  labels:
    app.kubernetes.io/name: llm-d
    environment: prod
    priority: medium
spec:
  targetRef:
    group: inference.networking.x-k8s.io
    kind: InferencePool
    name: vllm-prod-pool
  
  # Relaxed objectives for medium priority
  objectives:
    - name: ttft-p99
      metric: time_to_first_token_p99
      targetValue: "1000ms"
      weight: 0.6
    
    - name: throughput
      metric: tokens_per_second
      targetValue: "1000"
      weight: 0.4
  
  priority: medium
  
  enforcement:
    mode: soft  # Best effort, no rejection

---
# NetworkPolicy: Allow traffic from Gateway to vLLM pods AND LMCache
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: llm-d-gateway-to-vllm
  namespace: model-serving-prod
  labels:
    app.kubernetes.io/name: llm-d
    environment: prod
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: model-serving-engine
  
  policyTypes:
    - Ingress
    - Egress
  
  ingress:
    # Allow from llm-d Gateway
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: llm-d-system
          podSelector:
            matchLabels:
              app.kubernetes.io/component: proxy
      ports:
        - protocol: TCP
          port: 8000
    
    # Allow from llm-d EPP (for health checks and metrics scraping)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: llm-d-system
          podSelector:
            matchLabels:
              app.kubernetes.io/component: epp
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 9090  # Metrics
    
    # Allow from Prometheus (metrics scraping)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 9090
  
  egress:
    # Allow vLLM to communicate with LMCache daemon (same node, hostIPC)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: lmcache
      ports:
        - protocol: TCP
          port: 5555  # ZMQ for cache transfer
        - protocol: TCP
          port: 8080  # HTTP for health/admin
    
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    
    # Allow vLLM to reach Redis (L3 cache tier)
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
