# llm-d Router values for dev environment
# Minimal configuration for development/testing

proxy:
  enabled: true
  replicaCount: 1  # Single replica in dev
  
  image:
    repository: ghcr.io/llm-d/proxy
    tag: v0.3.0
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  
  # Point to EPP service
  env:
    - name: EPP_URL
      value: "http://llm-d-router-epp:8081"
    - name: LOG_LEVEL
      value: "debug"
    - name: ENABLE_METRICS
      value: "true"

epp:
  enabled: true
  replicaCount: 1  # Single replica in dev
  
  image:
    repository: ghcr.io/llm-d/endpoint-picker
    tag: v0.3.0
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 8081
    targetPort: 8081
    metricsPort: 9091
  
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  
  # Dev configuration: simple load balancing, no cache-aware routing
  config:
    scorers:
      - name: load-balancing
        weight: 1.0
        enabled: true
    
    filters:
      - name: health-check
        enabled: true
    
    selector:
      strategy: round-robin
  
  env:
    - name: LOG_LEVEL
      value: "debug"
    - name: NAMESPACE
      value: "model-serving-dev"
    - name: INFERENCE_POOL_NAME
      value: "vllm-dev-pool"
    - name: ENABLE_METRICS
      value: "true"

# RBAC enabled for discovering InferencePools
rbac:
  create: true

serviceAccount:
  create: true
  name: llm-d-router
