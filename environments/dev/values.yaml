global:
  namespace: model-serving-dev

engine:
  vllm:
    args:
      - --model
      - /models/$(MODEL_NAME)
      - --tensor-parallel-size
      - "1"
      - --max-model-len
      - "4096"
      - --gpu-memory-utilization
      - "0.85"
      - --max-num-seqs
      - "64"
      - --kv-cache-dtype
      - fp8
      - --enable-prefix-caching
      - --block-size
      - "16"
    resources:
      # QoS Guaranteed: requests == limits for all resources.
      limits:
        nvidia.com/gpu: 1
        cpu: "2"
        memory: 16Gi
      requests:
        nvidia.com/gpu: 1
        cpu: "2"
        memory: 16Gi

replicaCount: 1

persistence:
  storageClass: local-path
  size: 30Gi

persistenceRWX:
  storageClass: local-path
  size: 30Gi

autoscaling:
  enabled: false

podDisruptionBudget:
  enabled: false

# Isolate vLLM pods on GPU-only nodes (physical IA node isolation)
nodeSelector:
  nvidia.com/gpu.present: "true"

# Disable swap on GPU nodes via DaemonSet (swapoff -a)
gpuNodeSwapoff: true

# --- LMCache: disabled in dev (single instance, no distributed cache needed) ---
lmcache:
  enabled: false

# --- SafeTensors cache persistence: disabled in dev ---
cachePersistence:
  enabled: false

# --- Layer 4: Prometheus scrape of vLLM /metrics (5-10s interval) ---
serviceMonitor:
  enabled: true
  path: /metrics
  interval: 10s          # dev: 10s is fine for non-critical env
  scrapeTimeout: 5s
  releaseLabel: prometheus

tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule