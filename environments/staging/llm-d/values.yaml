global:
  namespace: llm-d-system

# Staging: EPP routing enabled, no KV-Cache Indexer (Phase 1)
router:
  enabled: true
  replicaCount: 2
  epp:
    plugin: prefix-cache
    minReplicas: 1
    scoringWeights:
      cacheHit: 0.7
      queueDepth: 0.2
      gpuUtilization: 0.1
    maxInflightPerReplica: 64
  pdb:
    enabled: true
    minAvailable: 1

kvCacheIndexer:
  enabled: false

inferencePool:
  enabled: true
  modelName: ""
  targetService:
    name: ""
    port: 80

disaggregation:
  enabled: false