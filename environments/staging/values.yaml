global:
  namespace: model-serving-staging

engine:
  vllm:
    args:
      - --model
      - /models/$(MODEL_NAME)
      - --tensor-parallel-size
      - "1"
      - --max-model-len
      - "8192"
      - --gpu-memory-utilization
      - "0.88"
      - --max-num-seqs
      - "128"
      - --kv-cache-dtype
      - fp8
      - --enable-prefix-caching
      - --block-size
      - "16"
      # Note: --enable-chunked-prefill is DISABLED when LMCache is enabled
      # (StatefulSet template forces it to false for LMCache cache coherence)
      # llm-d cache-aware routing works with LMCache's prefix cache management
      # KV-cache events are emitted via llm-d env vars (LLM_D_KV_EVENTS) — see llmD.emitKvEvents below
    resources:
      # QoS Guaranteed: requests == limits for all resources.
      limits:
        nvidia.com/gpu: 1
        cpu: "4"
        memory: 24Gi
      requests:
        nvidia.com/gpu: 1
        cpu: "4"
        memory: 24Gi

replicaCount: 1

persistence:
  storageClass: longhorn
  size: 50Gi

persistenceRWX:
  storageClass: longhorn-rwx
  size: 50Gi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  keda:
    enabled: true
    pollingInterval: 15
    cooldownPeriod: 60
    queueDepthThreshold: "5"
    cacheUsageThreshold: "0.85"

# Isolate vLLM pods on GPU-only nodes (physical IA node isolation)
nodeSelector:
  nvidia.com/gpu.present: "true"

# Disable swap on GPU nodes via DaemonSet (swapoff -a)
gpuNodeSwapoff: true

# --- LMCache: distributed KV cache (L1 CPU / L2 NVMe) ---
lmcache:
  enabled: true
  cpuWorkers: 2
  chunkSize: 256
  mp:
    host: "127.0.0.1"
    port: 5555
    transferMode: zmq
  hostIPC: true
  circuitBreaker:
    enabled: true
    maxFailures: 3
  cacheBlend:
    enabled: false
    specialStr: "< Rag_sep >"
    useLayerwise: true
    checkLayers: 1
    recomputeRatios: 0.15
  kvTransferConfig:
    connector: LMCacheMPConnector
    role: kv_both
    modulePath: lmcache.integration.vllm
    disableHybridKvCacheManager: false
  env:
    PYTHONHASHSEED: "0"
  disk:
    enabled: true
    path: /var/lib/lmcache
    hostPath: /var/lib/lmcache
    maxSize: 100GiB
  redis:
    enabled: false
  resources:
    requests:
      cpu: 250m
      memory: 4Gi
    limits:
      cpu: "1"
      memory: 8Gi

# --- SafeTensors cache persistence: fast restart skips re-prefill ---
cachePersistence:
  enabled: true
  storageClass: longhorn
  size: 30Gi

tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule
  - key: node-role.kubernetes.io/gpu
    operator: Exists
    effect: NoSchedule

# --- llm-d: EPP routing enabled (Phase 1), no KV-Cache Indexer yet ---
llmD:
  enabled: true
  inferencePoolName: "staging-llm-d"
  eppEndpoint: "staging-llm-d-router.llm-d-system.svc.cluster.local:80"
  emitKvEvents: false

disaggregation:
  enabled: false
  role: unified