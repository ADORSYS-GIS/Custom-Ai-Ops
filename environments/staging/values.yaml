global:
  namespace: model-serving-staging

engine:
  vllm:
    args:
      - --model
      - /models/$(MODEL_NAME)
      - --tensor-parallel-size
      - "1"
      - --max-model-len
      - "8192"
      - --gpu-memory-utilization
      - "0.88"
      - --max-num-seqs
      - "128"
      - --kv-cache-dtype
      - fp8
      - --enable-prefix-caching
      - --block-size
      - "16"
    resources:
      # QoS Guaranteed: requests == limits for all resources.
      limits:
        nvidia.com/gpu: 1
        cpu: "4"
        memory: 24Gi
      requests:
        nvidia.com/gpu: 1
        cpu: "4"
        memory: 24Gi

replicaCount: 1

persistence:
  storageClass: longhorn
  size: 50Gi

persistenceRWX:
  storageClass: longhorn-rwx
  size: 50Gi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  keda:
    enabled: true
    prometheusAddress: "http://prometheus-server.monitoring.svc.cluster.local:9090"
    pollingInterval: 15
    cooldownPeriod: 60
    queueDepthThreshold: "5"
    cacheUsageThreshold: "0.85"

# Isolate vLLM pods on GPU-only nodes (physical IA node isolation)
nodeSelector:
  nvidia.com/gpu.present: "true"

# Disable swap on GPU nodes via DaemonSet (swapoff -a)
gpuNodeSwapoff: true

# --- LMCache: distributed KV cache (L1 CPU / L2 NVMe) ---
lmcache:
  enabled: true
  cpuWorkers: 2
  disk:
    enabled: true
    path: /var/lib/lmcache
    hostPath: /var/lib/lmcache
    maxSize: 100GiB
  redis:
    enabled: false
  resources:
    requests:
      cpu: 250m
      memory: 4Gi
    limits:
      cpu: "1"
      memory: 8Gi

# --- SafeTensors cache persistence: fast restart skips re-prefill ---
cachePersistence:
  enabled: true
  storageClass: longhorn
  size: 30Gi

# --- Layer 4: Prometheus scrape of vLLM /metrics (5-10s interval) ---
serviceMonitor:
  enabled: true
  path: /metrics
  interval: 10s
  scrapeTimeout: 5s
  releaseLabel: prometheus

tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule
  - key: node-role.kubernetes.io/gpu
    operator: Exists
    effect: NoSchedule