# Longhorn Distributed Storage
#
# Longhorn provides distributed block storage for Kubernetes, used by
# model-serving-engine for persistent model weights (PVC).
#
# --- Installation ---
# Add the Helm repository:
#   helm repo add longhorn https://charts.longhorn.io
#   helm repo update
#
# Install via ArgoCD (this directory is referenced by the infrastructure AppSet):
#   The AppSet at apps/argocd-appset-prod.yaml deploys this automatically.
#
# Manual install:
#   helm install longhorn longhorn/longhorn \
#     --namespace longhorn-system \
#     --create-namespace \
#     --set persistence.defaultClass=true \
#     --set persistence.defaultClassReplicaCount=3
#
# --- Storage Classes ---
# After installation, two StorageClasses are created:
#   - longhorn        (ReadWriteOnce) — used by model-serving-engine persistence
#   - longhorn-rwx    (ReadWriteMany) — used by model-serving-engine persistenceRWX
#
# To create the RWX StorageClass:
#   kubectl apply -f - <<EOF
#   apiVersion: storage.k8s.io/v1
#   kind: StorageClass
#   metadata:
#     name: longhorn-rwx
#   provisioner: driver.longhorn.io
#   parameters:
#     dataEngine: v1
#     numberOfReplicas: "3"
#     staleReplicaTimeout: "30"
#     fromBackup: ""
#     fsType: ext4
#   allowVolumeExpansion: true
#   reclaimPolicy: Retain
#   volumeBindingMode: Immediate
#   mountOptions:
#     - noatime
#   EOF
#
# --- Verification ---
#   kubectl get pods -n longhorn-system
#   kubectl get storageclass | grep longhorn
#   kubectl get pvc -n model-serving-prod
#
# --- Model Weights Storage ---
# Model weights are stored in PVCs provisioned by Longhorn:
#   - persistence.storageClass: longhorn       (RWO, 100Gi prod)
#   - persistenceRWX.storageClass: longhorn-rwx (RWX, 100Gi prod)
# The seed-job downloads model weights from HuggingFace/S3 into the PVC
# during initial deployment.
---
apiVersion: v1
kind: Namespace
metadata:
  name: longhorn-system
  labels:
    pod-security.kubernetes.io/enforce: privileged
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: infrastructure
  source:
    repoURL: https://charts.longhorn.io
    chart: longhorn
    targetRevision: 1.7.2
    helm:
      values: |
        persistence:
          defaultClass: true
          defaultClassReplicaCount: 3
          reclaimPolicy: Retain
        longhornUI:
          replicas: 2
        longhornManager:
          tolerations:
            - key: node-role.kubernetes.io/gpu
              operator: Exists
              effect: NoSchedule
        longhornDriver:
          tolerations:
            - key: node-role.kubernetes.io/gpu
              operator: Exists
              effect: NoSchedule
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m