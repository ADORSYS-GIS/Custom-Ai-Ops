# External Secrets Operator (ESO)
#
# ESO synchronizes secrets from external secret stores (Vault, AWS SM,
# GCP SM, Azure KV) into Kubernetes Secrets. Used for:
#   - SaaS fallback API keys (OpenAI, Anthropic, etc.)
#   - Alertmanager credentials (PagerDuty, Slack)
#   - Container registry pull secrets
#   - ArgoCD Image Updater GitHub PAT
#
# --- Installation ---
# Add the Helm repository:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm repo update
#
# Install via ArgoCD:
#   The AppSet at apps/argocd-appset-prod.yaml deploys this automatically.
#
# Manual install:
#   helm install external-secrets external-secrets/external-secrets \
#     --namespace external-secrets \
#     --create-namespace \
#     --set installCRDs=true
#
# --- Configuration ---
# After installation, apply the SecretStore and ExternalSecret manifests:
#   kubectl apply -f apps/external-secrets.yaml
#
# The SecretStore must be configured with credentials to access your
# secret backend. See apps/external-secrets.yaml for examples with
# Vault, AWS Secrets Manager, GCP Secret Manager, and Azure Key Vault.
#
# --- Verification ---
#   kubectl get pods -n external-secrets
#   kubectl get secretstore -A
#   kubectl get externalsecret -A
#   kubectl describe externalsecret saas-api-keys -n envoy-gateway-system
#
# --- IRSA (IAM Roles for Service Accounts) ---
# For AWS, use IRSA instead of static credentials:
#   1. Create an IAM role with SecretsManagerReadWrite policy
#   2. Annotate the model-serving ServiceAccount:
#      annotations:
#        eks.amazonaws.com/role-arn: arn:aws:iam::<account>:role/<role-name>
#   3. The SecretStore uses jwt auth (no static AWS credentials needed)
---
apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: infrastructure
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.10.0
    helm:
      values: |
        installCRDs: true
        serviceAccount:
          create: true
          name: external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m