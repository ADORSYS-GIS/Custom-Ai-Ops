# Prometheus Stack (kube-prometheus-stack)
#
# Deploys Prometheus, Alertmanager, Grafana, and the Prometheus Operator.
# This is the core observability stack that scrapes vLLM /metrics,
# evaluates alert rules, and visualizes dashboards.
#
# --- Installation ---
# Add the Helm repository:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo update
#
# Install via ArgoCD (this directory is referenced by the infrastructure AppSet):
#   The AppSet at apps/argocd-appset-prod.yaml deploys this automatically.
#
# Manual install:
#   helm install prometheus prometheus-community/kube-prometheus-stack \
#     --namespace monitoring \
#     --create-namespace \
#     --set prometheus.prometheusSpec.serviceMonitorSelectorNilUsesHelmValues=false \
#     --set prometheus.prometheusSpec.ruleSelectorNilUsesHelmValues=false \
#     --set grafana.adminPassword=admin123
#
# --- CRITICAL Configuration ---
# The following settings MUST be configured for model-serving to work:
#
# 1. serviceMonitorSelectorNilUsesHelmValues=false
#    Allows Prometheus to discover ServiceMonitors created by model-serving-engine
#    (the chart creates a ServiceMonitor with label release=prometheus)
#
# 2. ruleSelectorNilUsesHelmValues=false
#    Allows Prometheus to load PrometheusRules from the observability/ directory
#    (model-serving-anomaly-rules.yaml with 6 alert groups)
#
# 3. Additional scrape configs for DCGM exporter
#    The GPU Operator's DCGM exporter is auto-discovered via its own ServiceMonitor
#
# --- Alert Rules ---
# The file observability/prometheus-anomaly-rules.yaml defines 6 alert groups:
#   - model-serving.latency (p95 > 2s, p99 > 5s)
#   - model-serving.errors (5xx > 5%, 5xx > 15%)
#   - model-serving.gpu (thermal throttle, low util, VRAM exhaustion)
#   - model-serving.pods (crashloop, OOM kills)
#   - model-serving.anomaly (unexpected pod count, high restart rate)
#   - model-serving.kv-cache (KV cache usage, queue depth, swap, hit rate)
#
# Apply the rules:
#   kubectl apply -f observability/prometheus-anomaly-rules.yaml
#
# --- Grafana Dashboards ---
# The file observability/grafana-dashboards/vllm-dashboard.json defines
# 12 panels including 6 KV cache panels.
# Import via ConfigMap or Grafana UI.
#
# --- Alertmanager ---
# The file observability/alertmanager-routes.yaml defines routing:
#   - critical → PagerDuty + Slack #ml-incidents
#   - warning → Slack #ml-ops
#   - gpu → Slack #gpu-ops
#   - model-serving → Slack #ml-ops
#
# Apply the config:
#   kubectl create secret generic alertmanager-config \
#     --from-file=config.yaml=observability/alertmanager-routes.yaml \
#     -n monitoring
#
# --- Verification ---
#   kubectl get pods -n monitoring
#   kubectl port-forward svc/prometheus-server 9090:9090 -n monitoring
#   # Open http://localhost:9090/targets — vLLM should appear
#   # Open http://localhost:9090/rules — all 6 alert groups should appear
#   kubectl port-forward svc/prometheus-grafana 3000:80 -n monitoring
#   # Open http://localhost:3000 — login with admin / admin123
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: infrastructure
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 65.5.0
    helm:
      values: |
        prometheus:
          prometheusSpec:
            # CRITICAL: allow discovery of ServiceMonitors and PrometheusRules
            # created by model-serving-engine chart and observability/ directory
            serviceMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            # Scrape interval for vLLM metrics (5-10s recommended)
            scrapeInterval: 10s
            evaluationInterval: 10s
            retention: 30d
            retentionSize: 50GB
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 50Gi
            # Alertmanager configuration
            alerting:
              alertmanagers:
                - name: prometheus-alertmanager
                  namespace: monitoring
                  port: 9093
                  apiVersion: v2
        alertmanager:
          config:
            useExistingSecret:
              name: alertmanager-config
              key: config.yaml
          ingress:
            enabled: true
            hosts:
              - alertmanager.example.com
        grafana:
          adminPassword: admin123
          persistence:
            enabled: true
            storageClassName: longhorn
            size: 10Gi
          dashboards:
            default:
              vllm:
                file: vllm-dashboard.json
          dashboardProviders:
            default:
              orgId: 1
              folder: ""
              folderUID: ""
              provider:
                name: default
                disableDeletion: false
                allowUiUpdates: true
          ingress:
            enabled: true
            hosts:
              - grafana.example.com
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m