# cert-manager
#
# cert-manager provides automatic TLS certificate provisioning for
# internal services. It uses Let's Encrypt (production) or a self-signed
# CA (dev/staging).
#
# --- Installation ---
# Add the Helm repository:
#   helm repo add jetstack https://charts.jetstack.io
#   helm repo update
#
# Install via ArgoCD:
#   The AppSet at apps/argocd-appset-prod.yaml deploys this automatically.
#
# Manual install:
#   helm install cert-manager jetstack/cert-manager \
#     --namespace cert-manager \
#     --create-namespace \
#     --set installCRDs=true \
#     --set featureGates.additionalCertificateOutputFormats=true
#
# --- ClusterIssuer (Let's Encrypt) ---
# Apply a ClusterIssuer for production TLS:
#   kubectl apply -f - <<EOF
#   apiVersion: cert-manager.io/v1
#   kind: ClusterIssuer
#   metadata:
#     name: letsencrypt-prod
#   spec:
#     acme:
#       server: https://acme-v02.api.letsencrypt.org/directory
#       email: ops@example.com
#       privateKeySecretRef:
#         name: letsencrypt-prod-account-key
#       solvers:
#         - http01:
#             ingress:
#               class: nginx
#   EOF
#
# --- Verification ---
#   kubectl get pods -n cert-manager
#   kubectl get clusterissuer
#   kubectl get certificate -A
---
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: infrastructure
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: v1.16.0
    helm:
      values: |
        installCRDs: true
        featureGates:
          additionalCertificateOutputFormats: true
        ingressShim:
          defaultIssuerName: letsencrypt-prod
          defaultIssuerKind: ClusterIssuer
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m
---
# ClusterIssuer for Let's Encrypt production
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ops@example.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
# ClusterIssuer for Let's Encrypt staging (use for dev/staging)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: ops@example.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            class: nginx